<svg xmlns="http://www.w3.org/2000/svg" width="900" height="560" font-family="Segoe UI, Arial, sans-serif" font-size="14">
  <rect width="900" height="560" fill="#ffffff"/>
  <text x="450" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#111">Adaptive Rendering Engine — System Architecture</text>

  <!-- Client -->
  <rect x="350" y="60" width="200" height="48" rx="8" fill="#e8f0fe" stroke="#4285f4"/>
  <text x="450" y="89" text-anchor="middle" fill="#1a3a6b">Client (Browser / curl / ab)</text>

  <!-- arrow to proxy -->
  <line x1="450" y1="108" x2="450" y2="140" stroke="#666" stroke-width="2" marker-end="url(#a)"/>
  <text x="462" y="130" fill="#666" font-size="12">:8080</text>

  <!-- Proxy -->
  <rect x="330" y="140" width="240" height="48" rx="8" fill="#fef7e0" stroke="#f9ab00"/>
  <text x="450" y="169" text-anchor="middle" fill="#7a4f01">nginx Reverse Proxy (Simulated Edge front)</text>

  <!-- arrows to nodes -->
  <line x1="380" y1="188" x2="170" y2="230" stroke="#666" stroke-width="2" marker-end="url(#a)"/>
  <line x1="450" y1="188" x2="450" y2="230" stroke="#666" stroke-width="2" marker-end="url(#a)"/>
  <line x1="520" y1="188" x2="730" y2="230" stroke="#666" stroke-width="2" marker-end="url(#a)"/>

  <!-- edge 1 -->
  <rect x="60" y="230" width="220" height="64" rx="8" fill="#e6f4ea" stroke="#34a853"/>
  <text x="170" y="256" text-anchor="middle" fill="#13602b">edge-node-1 (ARE)</text>
  <text x="170" y="276" text-anchor="middle" fill="#13602b" font-size="12">+20ms · own cache · :8081</text>

  <!-- origin -->
  <rect x="340" y="230" width="220" height="64" rx="8" fill="#e6f4ea" stroke="#34a853"/>
  <text x="450" y="256" text-anchor="middle" fill="#13602b">origin (ARE engine)</text>
  <text x="450" y="276" text-anchor="middle" fill="#13602b" font-size="12">no latency · :3000 (internal)</text>

  <!-- edge 2 -->
  <rect x="620" y="230" width="220" height="64" rx="8" fill="#e6f4ea" stroke="#34a853"/>
  <text x="730" y="256" text-anchor="middle" fill="#13602b">edge-node-2 (ARE)</text>
  <text x="730" y="276" text-anchor="middle" fill="#13602b" font-size="12">+80ms · own cache · :8082</text>

  <!-- engine internal box -->
  <rect x="250" y="330" width="400" height="150" rx="10" fill="#f1f3f4" stroke="#9aa0a6" stroke-dasharray="4 3"/>
  <text x="450" y="352" text-anchor="middle" font-weight="bold" fill="#333">Inside each ARE node</text>
  <rect x="270" y="364" width="170" height="38" rx="6" fill="#fff" stroke="#4285f4"/>
  <text x="355" y="388" text-anchor="middle" font-size="12" fill="#1a3a6b">Context Analyzer</text>
  <rect x="460" y="364" width="170" height="38" rx="6" fill="#fff" stroke="#4285f4"/>
  <text x="545" y="388" text-anchor="middle" font-size="12" fill="#1a3a6b">Decision Engine</text>
  <rect x="270" y="414" width="170" height="38" rx="6" fill="#fff" stroke="#4285f4"/>
  <text x="355" y="438" text-anchor="middle" font-size="12" fill="#1a3a6b">Strategy Registry (6)</text>
  <rect x="460" y="414" width="170" height="38" rx="6" fill="#fff" stroke="#4285f4"/>
  <text x="545" y="438" text-anchor="middle" font-size="12" fill="#1a3a6b">Metrics Collector</text>

  <line x1="450" y1="294" x2="450" y2="330" stroke="#666" stroke-width="2" marker-end="url(#a)"/>

  <!-- redis -->
  <rect x="680" y="400" width="160" height="48" rx="8" fill="#fce8e6" stroke="#ea4335"/>
  <text x="760" y="423" text-anchor="middle" fill="#8a1c12">Redis</text>
  <text x="760" y="440" text-anchor="middle" font-size="11" fill="#8a1c12">shared edge cache (optional)</text>
  <line x1="650" y1="438" x2="680" y2="430" stroke="#666" stroke-width="2" marker-end="url(#a)"/>

  <text x="450" y="520" text-anchor="middle" font-size="12" fill="#666">One private Docker network — services address each other by name. Only proxy/edge ports are published.</text>

  <defs>
    <marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#666"/>
    </marker>
  </defs>
</svg>
