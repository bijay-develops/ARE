<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="860" font-family="Segoe UI, Arial, sans-serif" font-size="13">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#555"/>
    </marker>
  </defs>
  <rect width="1100" height="860" fill="#ffffff"/>
  <text x="550" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#111">Adaptive Rendering Engine — Data Flow Diagram (Level 1)</text>
  <text x="550" y="54" text-anchor="middle" font-size="12" fill="#777">External entity ▭   ·   Process ◯   ·   Data store ▤   ·   one request: analyze → decide → render → respond → measure</text>

  <!-- ───────────── External entities (left column) ───────────── -->
  <rect x="40" y="120" width="180" height="52" rx="4" fill="#e8f0fe" stroke="#4285f4"/>
  <text x="130" y="142" text-anchor="middle" fill="#1a3a6b" font-weight="bold">Client / Browser</text>
  <text x="130" y="160" text-anchor="middle" fill="#1a3a6b" font-size="11">curl · ab · browser</text>

  <rect x="40" y="210" width="180" height="52" rx="4" fill="#e6f4ea" stroke="#34a853"/>
  <text x="130" y="232" text-anchor="middle" fill="#13602b" font-weight="bold">Edge nginx node</text>
  <text x="130" y="250" text-anchor="middle" fill="#13602b" font-size="11">+latency · X-Served-By</text>

  <rect x="40" y="300" width="180" height="52" rx="4" fill="#fce8e6" stroke="#ea4335"/>
  <text x="130" y="322" text-anchor="middle" fill="#8a1c12" font-weight="bold">Test / Load scripts</text>
  <text x="130" y="340" text-anchor="middle" fill="#8a1c12" font-size="11">X-* control headers</text>

  <!-- ───────────── Process 1: Request Handler ───────────── -->
  <rect x="300" y="150" width="190" height="150" rx="12" fill="#fff" stroke="#4285f4" stroke-width="2"/>
  <text x="395" y="178" text-anchor="middle" font-weight="bold" fill="#1a3a6b">1.0 HTTP Request</text>
  <text x="395" y="196" text-anchor="middle" font-weight="bold" fill="#1a3a6b">Handler</text>
  <text x="395" y="218" text-anchor="middle" fill="#555" font-size="11">server.ts · router · middleware</text>
  <text x="395" y="240" text-anchor="middle" fill="#555" font-size="11">normalize headers</text>
  <text x="395" y="258" text-anchor="middle" fill="#555" font-size="11">resolve page · count in-flight</text>
  <text x="395" y="276" text-anchor="middle" fill="#555" font-size="11">simulate network/edge delay</text>

  <!-- Page/route store (config) -->
  <rect x="300" y="340" width="190" height="40" fill="#f1f3f4" stroke="#9aa0a6"/>
  <line x1="300" y1="356" x2="490" y2="356" stroke="#9aa0a6"/>
  <text x="395" y="353" text-anchor="middle" font-size="11" fill="#444">D6  Route table / Page modules</text>
  <text x="395" y="372" text-anchor="middle" font-size="10" fill="#777">/ · /static · /dynamic · /heavy</text>

  <!-- ───────────── Process 2: Analyzer ───────────── -->
  <rect x="560" y="120" width="180" height="86" rx="12" fill="#fff" stroke="#a142f4" stroke-width="2"/>
  <text x="650" y="150" text-anchor="middle" font-weight="bold" fill="#5b1a8a">2.0 Context Analyzer</text>
  <text x="650" y="170" text-anchor="middle" fill="#555" font-size="11">headers + signals →</text>
  <text x="650" y="187" text-anchor="middle" fill="#555" font-size="11">RequestContext</text>

  <!-- ───────────── Process 3: Decision Engine ───────────── -->
  <rect x="560" y="250" width="180" height="86" rx="12" fill="#fff" stroke="#f9ab00" stroke-width="2"/>
  <text x="650" y="280" text-anchor="middle" font-weight="bold" fill="#7a4f01">3.0 Decision Engine</text>
  <text x="650" y="300" text-anchor="middle" fill="#555" font-size="11">9-rule table, 1st match</text>
  <text x="650" y="317" text-anchor="middle" fill="#555" font-size="11">→ DecisionTrace</text>

  <!-- ───────────── Process 4: Render ───────────── -->
  <rect x="560" y="380" width="180" height="100" rx="12" fill="#fff" stroke="#34a853" stroke-width="2"/>
  <text x="650" y="408" text-anchor="middle" font-weight="bold" fill="#13602b">4.0 Render</text>
  <text x="650" y="426" text-anchor="middle" fill="#555" font-size="11">Strategy Registry</text>
  <text x="650" y="443" text-anchor="middle" fill="#555" font-size="10">SSG·SSR·Streaming·ISR·</text>
  <text x="650" y="458" text-anchor="middle" fill="#555" font-size="10">CSR·Edge-ISR (+SSR fallback)</text>
  <text x="650" y="474" text-anchor="middle" fill="#555" font-size="11">→ RenderResult</text>

  <!-- ───────────── Process 5: Cache Manager ───────────── -->
  <rect x="850" y="250" width="200" height="100" rx="12" fill="#fff" stroke="#00897b" stroke-width="2"/>
  <text x="950" y="278" text-anchor="middle" font-weight="bold" fill="#055d54">5.0 Cache Manager</text>
  <text x="950" y="298" text-anchor="middle" fill="#555" font-size="11">peekState · lookup · set</text>
  <text x="950" y="315" text-anchor="middle" fill="#555" font-size="10">read: mem → redis → file</text>
  <text x="950" y="331" text-anchor="middle" fill="#555" font-size="10">write: fan-out to all</text>

  <!-- Cache data stores -->
  <rect x="850" y="380" width="92" height="40" fill="#e0f2f1" stroke="#00897b"/>
  <line x1="850" y1="396" x2="942" y2="396" stroke="#00897b"/>
  <text x="896" y="393" text-anchor="middle" font-size="10" fill="#055d54">D1 Memory</text>
  <text x="896" y="412" text-anchor="middle" font-size="9" fill="#077">per-process</text>

  <rect x="958" y="380" width="92" height="40" fill="#e0f2f1" stroke="#00897b"/>
  <line x1="958" y1="396" x2="1050" y2="396" stroke="#00897b"/>
  <text x="1004" y="393" text-anchor="middle" font-size="10" fill="#055d54">D2 File</text>
  <text x="1004" y="412" text-anchor="middle" font-size="9" fill="#077">.cache/</text>

  <rect x="850" y="430" width="92" height="40" fill="#e0f2f1" stroke="#00897b"/>
  <line x1="850" y1="446" x2="942" y2="446" stroke="#00897b"/>
  <text x="896" y="443" text-anchor="middle" font-size="10" fill="#055d54">D3 Redis</text>
  <text x="896" y="462" text-anchor="middle" font-size="9" fill="#077">shared/edge</text>

  <rect x="958" y="430" width="92" height="40" fill="#fff3e0" stroke="#f9ab00"/>
  <line x1="958" y1="446" x2="1050" y2="446" stroke="#f9ab00"/>
  <text x="1004" y="443" text-anchor="middle" font-size="10" fill="#7a4f01">D4 SSG</text>
  <text x="1004" y="462" text-anchor="middle" font-size="9" fill="#7a4f01">public/ssg/</text>

  <!-- ───────────── Process 6: Metrics ───────────── -->
  <rect x="300" y="560" width="190" height="80" rx="12" fill="#fff" stroke="#ea4335" stroke-width="2"/>
  <text x="395" y="588" text-anchor="middle" font-weight="bold" fill="#8a1c12">6.0 Metrics Collector</text>
  <text x="395" y="608" text-anchor="middle" fill="#555" font-size="11">record per-request timing</text>
  <text x="395" y="625" text-anchor="middle" fill="#555" font-size="11">(non-blocking)</text>

  <rect x="560" y="570" width="200" height="58" fill="#fce8e6" stroke="#ea4335"/>
  <line x1="560" y1="586" x2="760" y2="586" stroke="#ea4335"/>
  <text x="660" y="583" text-anchor="middle" font-size="11" fill="#8a1c12">D5  Metrics store</text>
  <text x="660" y="602" text-anchor="middle" font-size="10" fill="#8a1c12">experiments/results/report.json|csv</text>
  <text x="660" y="618" text-anchor="middle" font-size="10" fill="#8a1c12">+ [ARE] decision logs</text>

  <!-- ═════════════ Data flows ═════════════ -->
  <!-- entities → handler -->
  <line x1="220" y1="146" x2="300" y2="180" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="232" y="150" font-size="10" fill="#444">HTTP req + headers</text>
  <line x1="220" y1="236" x2="300" y2="215" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="232" y="205" font-size="10" fill="#444">forwarded req</text>
  <line x1="220" y1="326" x2="300" y2="250" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="232" y="300" font-size="10" fill="#444">X-* overrides</text>

  <!-- handler ↔ route store -->
  <line x1="395" y1="340" x2="395" y2="300" stroke="#9aa0a6" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="400" y="324" font-size="10" fill="#777">resolvePage</text>

  <!-- handler → analyzer -->
  <line x1="490" y1="190" x2="560" y2="165" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="492" y="172" font-size="10" fill="#444">url, headers,</text>
  <text x="492" y="184" font-size="10" fill="#444">page, signals</text>

  <!-- handler → cache (peek) -->
  <line x1="490" y1="230" x2="850" y2="278" stroke="#00897b" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="690" y="240" font-size="10" fill="#055d54">peekState(key)</text>

  <!-- analyzer → decision -->
  <line x1="650" y1="206" x2="650" y2="250" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="658" y="232" font-size="10" fill="#444">RequestContext</text>

  <!-- decision → render -->
  <line x1="650" y1="336" x2="650" y2="380" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="658" y="362" font-size="10" fill="#444">DecisionTrace</text>

  <!-- render ↔ cache -->
  <line x1="740" y1="410" x2="850" y2="340" stroke="#00897b" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="748" y="372" font-size="10" fill="#055d54">lookup / set</text>

  <!-- cache ↔ stores -->
  <line x1="896" y1="350" x2="896" y2="380" stroke="#00897b" stroke-width="1.2" marker-end="url(#a)"/>
  <line x1="1004" y1="350" x2="1004" y2="380" stroke="#00897b" stroke-width="1.2" marker-end="url(#a)"/>
  <line x1="940" y1="350" x2="896" y2="430" stroke="#00897b" stroke-width="1.2" marker-end="url(#a)"/>
  <line x1="990" y1="350" x2="1004" y2="430" stroke="#f9ab00" stroke-width="1.2" marker-end="url(#a)"/>

  <!-- render → handler (result) -->
  <path d="M560 460 C 500 460, 470 360, 490 300" fill="none" stroke="#34a853" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="470" y="430" font-size="10" fill="#13602b">RenderResult</text>
  <text x="470" y="444" font-size="10" fill="#13602b">(body/stream)</text>

  <!-- handler → client (response) -->
  <path d="M300 200 C 200 120, 120 100, 120 120" fill="none" stroke="#4285f4" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="150" y="98" font-size="10" fill="#1a3a6b">HTML/stream + X-Rendering-Strategy + X-Decision-Reason</text>

  <!-- handler → metrics -->
  <line x1="395" y1="300" x2="395" y2="560" stroke="#ea4335" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="402" y="500" font-size="10" fill="#8a1c12">record(strategy, ttfb,</text>
  <text x="402" y="513" font-size="10" fill="#8a1c12">render, bytes, ctx)</text>

  <!-- metrics → store -->
  <line x1="490" y1="600" x2="560" y2="600" stroke="#ea4335" stroke-width="1.5" marker-end="url(#a)"/>

  <text x="550" y="700" text-anchor="middle" font-size="11" fill="#999">Decision inputs: network speed · device · cache state · load (concurrency) · data volatility · payload size · edge flag</text>
  <text x="550" y="718" text-anchor="middle" font-size="11" fill="#999">Same URL + different X-* headers → different X-Rendering-Strategy. Engine is observe → decide → render, never decides during render.</text>
</svg>
