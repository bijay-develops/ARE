<svg xmlns="http://www.w3.org/2000/svg" width="900" height="640" font-family="Segoe UI, Arial, sans-serif" font-size="13">
  <rect width="900" height="640" fill="#ffffff"/>
  <text x="450" y="32" text-anchor="middle" font-size="20" font-weight="bold" fill="#111">Decision Engine — Rule Flow (first match wins)</text>

  <defs>
    <marker id="b" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#666"/>
    </marker>
  </defs>

  <!-- context -->
  <rect x="330" y="50" width="240" height="44" rx="8" fill="#e8f0fe" stroke="#4285f4"/>
  <text x="450" y="78" text-anchor="middle" fill="#1a3a6b">RequestContext (from X-* headers)</text>

  <!-- decision diamonds chain -->
  <!-- helper: each rule is a rounded rect; yes -> strategy on right; no -> down -->
  <g>
    <!-- R1 -->
    <line x1="450" y1="94" x2="450" y2="118" stroke="#666" stroke-width="2" marker-end="url(#b)"/>
    <rect x="290" y="118" width="320" height="36" rx="6" fill="#fff" stroke="#9aa0a6"/>
    <text x="300" y="141" fill="#333">1 · static AND cache≠cold ?</text>
    <rect x="650" y="118" width="120" height="36" rx="6" fill="#e6f4ea" stroke="#34a853"/>
    <text x="710" y="141" text-anchor="middle" fill="#13602b" font-weight="bold">SSG</text>
    <line x1="610" y1="136" x2="650" y2="136" stroke="#34a853" stroke-width="2" marker-end="url(#b)"/>

    <!-- R2 -->
    <line x1="450" y1="154" x2="450" y2="170" stroke="#666" stroke-width="2" marker-end="url(#b)"/>
    <rect x="290" y="170" width="320" height="36" rx="6" fill="#fff" stroke="#9aa0a6"/>
    <text x="300" y="193" fill="#333">2 · static AND isEdge ?</text>
    <rect x="650" y="170" width="120" height="36" rx="6" fill="#e6f4ea" stroke="#34a853"/>
    <text x="710" y="193" text-anchor="middle" fill="#13602b" font-weight="bold">EDGE_ISR</text>
    <line x1="610" y1="188" x2="650" y2="188" stroke="#34a853" stroke-width="2" marker-end="url(#b)"/>

    <!-- R3 -->
    <line x1="450" y1="206" x2="450" y2="222" stroke="#666" stroke-width="2" marker-end="url(#b)"/>
    <rect x="290" y="222" width="320" height="36" rx="6" fill="#fff" stroke="#9aa0a6"/>
    <text x="300" y="245" fill="#333">3 · load = high ?</text>
    <rect x="650" y="222" width="120" height="36" rx="6" fill="#e6f4ea" stroke="#34a853"/>
    <text x="710" y="245" text-anchor="middle" fill="#13602b" font-weight="bold">ISR</text>
    <line x1="610" y1="240" x2="650" y2="240" stroke="#34a853" stroke-width="2" marker-end="url(#b)"/>

    <!-- R4 -->
    <line x1="450" y1="258" x2="450" y2="274" stroke="#666" stroke-width="2" marker-end="url(#b)"/>
    <rect x="290" y="274" width="320" height="36" rx="6" fill="#fff" stroke="#9aa0a6"/>
    <text x="300" y="297" fill="#333">4 · realtime + fast + desktop ?</text>
    <rect x="650" y="274" width="120" height="36" rx="6" fill="#e6f4ea" stroke="#34a853"/>
    <text x="710" y="297" text-anchor="middle" fill="#13602b" font-weight="bold">CSR</text>
    <line x1="610" y1="292" x2="650" y2="292" stroke="#34a853" stroke-width="2" marker-end="url(#b)"/>

    <!-- R5 -->
    <line x1="450" y1="310" x2="450" y2="326" stroke="#666" stroke-width="2" marker-end="url(#b)"/>
    <rect x="290" y="326" width="320" height="36" rx="6" fill="#fff" stroke="#9aa0a6"/>
    <text x="300" y="349" fill="#333">5 · realtime + mobile ?</text>
    <rect x="650" y="326" width="120" height="36" rx="6" fill="#e6f4ea" stroke="#34a853"/>
    <text x="710" y="349" text-anchor="middle" fill="#13602b" font-weight="bold">SSR</text>
    <line x1="610" y1="344" x2="650" y2="344" stroke="#34a853" stroke-width="2" marker-end="url(#b)"/>

    <!-- R6 -->
    <line x1="450" y1="362" x2="450" y2="378" stroke="#666" stroke-width="2" marker-end="url(#b)"/>
    <rect x="290" y="378" width="320" height="36" rx="6" fill="#fff" stroke="#9aa0a6"/>
    <text x="300" y="401" fill="#333">6 · periodic ?</text>
    <rect x="650" y="378" width="120" height="36" rx="6" fill="#e6f4ea" stroke="#34a853"/>
    <text x="710" y="401" text-anchor="middle" fill="#13602b" font-weight="bold">ISR</text>
    <line x1="610" y1="396" x2="650" y2="396" stroke="#34a853" stroke-width="2" marker-end="url(#b)"/>

    <!-- R7 -->
    <line x1="450" y1="414" x2="450" y2="430" stroke="#666" stroke-width="2" marker-end="url(#b)"/>
    <rect x="290" y="430" width="320" height="36" rx="6" fill="#fff" stroke="#9aa0a6"/>
    <text x="300" y="453" fill="#333">7 · heavy AND network≠slow ?</text>
    <rect x="650" y="430" width="120" height="36" rx="6" fill="#e6f4ea" stroke="#34a853"/>
    <text x="710" y="453" text-anchor="middle" fill="#13602b" font-weight="bold" font-size="11">STREAMING_SSR</text>
    <line x1="610" y1="448" x2="650" y2="448" stroke="#34a853" stroke-width="2" marker-end="url(#b)"/>

    <!-- R8 -->
    <line x1="450" y1="466" x2="450" y2="482" stroke="#666" stroke-width="2" marker-end="url(#b)"/>
    <rect x="290" y="482" width="320" height="36" rx="6" fill="#fff" stroke="#9aa0a6"/>
    <text x="300" y="505" fill="#333">8 · network = slow ?</text>
    <rect x="650" y="482" width="120" height="36" rx="6" fill="#e6f4ea" stroke="#34a853"/>
    <text x="710" y="505" text-anchor="middle" fill="#13602b" font-weight="bold">SSR</text>
    <line x1="610" y1="500" x2="650" y2="500" stroke="#34a853" stroke-width="2" marker-end="url(#b)"/>

    <!-- fallback -->
    <line x1="450" y1="518" x2="450" y2="534" stroke="#666" stroke-width="2" marker-end="url(#b)"/>
    <rect x="350" y="534" width="200" height="40" rx="6" fill="#e6f4ea" stroke="#34a853"/>
    <text x="450" y="559" text-anchor="middle" fill="#13602b" font-weight="bold">9 · fallback → SSR</text>
  </g>

  <text x="155" y="300" text-anchor="middle" fill="#999" font-size="12" transform="rotate(-90 155 300)">no → next rule (top to bottom)</text>
  <text x="690" y="600" text-anchor="middle" fill="#34a853" font-size="12">yes → selected strategy</text>
</svg>
