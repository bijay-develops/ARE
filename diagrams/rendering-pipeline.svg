<svg xmlns="http://www.w3.org/2000/svg" width="940" height="340" font-family="Segoe UI, Arial, sans-serif" font-size="13">
  <rect width="940" height="340" fill="#ffffff"/>
  <text x="470" y="32" text-anchor="middle" font-size="20" font-weight="bold" fill="#111">Request Pipeline — analyze → decide → render → measure</text>

  <defs>
    <marker id="c" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#666"/>
    </marker>
  </defs>

  <!-- stages -->
  <g>
    <rect x="20"  y="90" width="150" height="60" rx="8" fill="#e8f0fe" stroke="#4285f4"/>
    <text x="95" y="115" text-anchor="middle" fill="#1a3a6b">HTTP Request</text>
    <text x="95" y="133" text-anchor="middle" font-size="11" fill="#1a3a6b">server.ts</text>

    <rect x="200" y="90" width="160" height="60" rx="8" fill="#fff" stroke="#4285f4"/>
    <text x="280" y="112" text-anchor="middle" fill="#1a3a6b">1 · Analyze</text>
    <text x="280" y="130" text-anchor="middle" font-size="11" fill="#666">context-analyzer.ts</text>

    <rect x="390" y="90" width="160" height="60" rx="8" fill="#fff" stroke="#4285f4"/>
    <text x="470" y="112" text-anchor="middle" fill="#1a3a6b">2 · Decide</text>
    <text x="470" y="130" text-anchor="middle" font-size="11" fill="#666">decision-engine.ts (pure)</text>

    <rect x="580" y="90" width="160" height="60" rx="8" fill="#fff" stroke="#4285f4"/>
    <text x="660" y="112" text-anchor="middle" fill="#1a3a6b">3 · Render</text>
    <text x="660" y="130" text-anchor="middle" font-size="11" fill="#666">strategy.render()</text>

    <rect x="770" y="90" width="150" height="60" rx="8" fill="#e6f4ea" stroke="#34a853"/>
    <text x="845" y="112" text-anchor="middle" fill="#13602b">4 · Respond</text>
    <text x="845" y="130" text-anchor="middle" font-size="11" fill="#13602b">+ X-Rendering-Strategy</text>

    <line x1="170" y1="120" x2="200" y2="120" stroke="#666" stroke-width="2" marker-end="url(#c)"/>
    <line x1="360" y1="120" x2="390" y2="120" stroke="#666" stroke-width="2" marker-end="url(#c)"/>
    <line x1="550" y1="120" x2="580" y2="120" stroke="#666" stroke-width="2" marker-end="url(#c)"/>
    <line x1="740" y1="120" x2="770" y2="120" stroke="#666" stroke-width="2" marker-end="url(#c)"/>
  </g>

  <!-- cache + metrics under render -->
  <rect x="560" y="190" width="200" height="40" rx="6" fill="#fef7e0" stroke="#f9ab00"/>
  <text x="660" y="215" text-anchor="middle" font-size="12" fill="#7a4f01">CacheManager (mem→redis→file)</text>
  <line x1="660" y1="150" x2="660" y2="190" stroke="#f9ab00" stroke-width="2" marker-end="url(#c)"/>

  <rect x="360" y="250" width="220" height="40" rx="6" fill="#fce8e6" stroke="#ea4335"/>
  <text x="470" y="275" text-anchor="middle" font-size="12" fill="#8a1c12">5 · Metrics → experiments/results</text>
  <line x1="470" y1="150" x2="470" y2="250" stroke="#ea4335" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#c)"/>

  <!-- six strategies row -->
  <text x="470" y="180" text-anchor="middle" font-size="12" fill="#999">6 pluggable strategies: SSG · SSR · Streaming SSR · ISR · CSR · Edge-ISR</text>
</svg>
