# Front reverse proxy: single public entry point on :80 (published as :8080).
# Routes to the origin by default and to edge nodes under /edge1 and /edge2.
# nginx forwards all X-* control headers, so header-driven strategy switching
# (doc 5) works through the proxy.

events {}

http {
  upstream origin       { server origin:3000; }
  upstream edge_node_1  { server edge-node-1:3000; }
  upstream edge_node_2  { server edge-node-2:3000; }

  # Preserve client-supplied control headers through the proxy.
  proxy_pass_request_headers on;

  server {
    listen 80;

    # Default → origin (marks the response as origin-served).
    location / {
      proxy_set_header Host $host;
      proxy_set_header X-Served-By origin;
      proxy_pass http://origin;
    }

    # /edge1/... → edge-node-1 (low latency)
    location /edge1/ {
      rewrite ^/edge1/(.*)$ /$1 break;
      proxy_set_header Host $host;
      proxy_pass http://edge_node_1;
    }

    # /edge2/... → edge-node-2 (higher latency)
    location /edge2/ {
      rewrite ^/edge2/(.*)$ /$1 break;
      proxy_set_header Host $host;
      proxy_pass http://edge_node_2;
    }
  }
}
